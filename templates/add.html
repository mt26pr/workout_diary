<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Add training! </title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        input, textarea { padding: 8px; }
    </style>
</head>
<body>
<h1>New training...</h1>

<form method="POST">
    <label>Date:</label>
    <input type="text" name="date" placeholder="year-month-day" required>

    <label>Sport type:</label>
    <input type="text" name="sport_type" placeholder="Running, Swimming, Flying" required>

    <label>Length (min):</label>
    <input type="number" name="duration" required>

    <label>Comment:</label>
    <textarea name="comment"></textarea>

    <button type="submit">Save training</button>
</form>

<br>
<a href="/">Back to home</a>
</body>
</html>
