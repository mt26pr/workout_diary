<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Workout</title>
</head>
<body>
    <h2>Edit Workout</h2>
    <form method="POST">
        <label>Date:</label><br>
        <input type="text" name="date" value="{{ workout['date'] }}" placeholder="YYYY-MM-DD" required><br><br>

        <label>Sport Type:</label><br>
        <select name="sport_id" required>
        {% for sport in sports %}
            <option value="{{ sport['id'] }}" {% if sport['id'] == workout['sport_id'] %}selected{% endif %}>
                {{ sport['name'] }}
            </option>
        {% endfor %}
        </select><br><br>

    <label>Length (min):</label><br>
    <input type="number" name="duration" min="1" required><br><br>

        <button type="submit">Save Changes</button>
    </form>
    <br>
    <a href="/workouts">Cancel and Go Back</a>
</body>
</html>
