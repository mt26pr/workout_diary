<!DOCTYPE html>
<html lang="en">
<head>
    <title>My workout diary</title>
</head>
<body>
<p>Hello, {{ current_user.username }}! <a href="/logout">Leave myself please</a></p>
<h1>My trainings</h1>
<a href="/add">Add training...</a>
<ul>
    {% for workout in workouts %}
    <li>{{ workout['date'] }} - {{ workout['sport_type'] }} ({{ workout['duration'] }} min)</li>
    {% endfor %}
</ul>
</body>
</html>
